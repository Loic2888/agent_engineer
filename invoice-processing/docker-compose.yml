services:
  invoice-agent:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=/app/data/invoices.db
      - PORT=${PORT:-3000}
    volumes:
      - invoice_data:/app/data
    restart: unless-stopped

volumes:
  invoice_data:
