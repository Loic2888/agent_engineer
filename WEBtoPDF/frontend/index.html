<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WEBtoPDF</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>WEBtoPDF</h1>
      <p class="subtitle">Intelligent file conversion powered by AI</p>
    </header>

    <main id="main">
      <!-- Mode selection -->
      <section id="mode-select" class="section">
        <h2>Choose a conversion mode</h2>
        <div class="cards">
          <button class="card" data-mode="html-to-pdf">
            <span class="card-icon">📄 → 📕</span>
            <h3>HTML/CSS → PDF</h3>
            <p>Upload your HTML and CSS files and get a pixel-perfect PDF.</p>
          </button>
          <button class="card" data-mode="pdf-to-html">
            <span class="card-icon">📕 → 📄</span>
            <h3>PDF → HTML/CSS</h3>
            <p>Upload a PDF and get an editable HTML page with CSS.</p>
          </button>
        </div>
      </section>

      <!-- Upload section -->
      <section id="upload-section" class="section hidden">
        <button class="back-btn" id="back-btn">← Back</button>
        <h2 id="upload-title"></h2>
        <p id="upload-hint" class="hint"></p>

        <div class="dropzone" id="dropzone">
          <span id="drop-label">Drop files here or click to browse</span>
          <input type="file" id="file-input" multiple hidden />
        </div>

        <ul id="file-list" class="file-list"></ul>

        <button class="btn-convert" id="btn-convert" disabled>Convert</button>
      </section>

      <!-- Progress section -->
      <section id="progress-section" class="section hidden">
        <div class="spinner"></div>
        <p class="progress-title">Converting...</p>
        <div id="agent-log" class="agent-log"></div>
      </section>

      <!-- Result section -->
      <section id="result-section" class="section hidden">
        <div id="result-icon" class="result-icon">✅</div>
        <h2>Conversion complete</h2>
        <div id="download-links" class="download-links"></div>
        <span id="score-badge" class="score-badge hidden"></span>
        <div id="warnings-box" class="warnings-box hidden"></div>
        <button class="btn-convert" id="btn-restart">Convert another file</button>
      </section>

      <!-- Error section -->
      <section id="error-section" class="section hidden">
        <div class="result-icon">❌</div>
        <h2>Conversion failed</h2>
        <div id="error-box" class="error-box"></div>
        <button class="btn-convert" id="btn-error-restart">Try again</button>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
