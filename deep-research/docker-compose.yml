services:
  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      CORS_ORIGINS: "http://localhost"
      DB_PATH: "/data/research.db"
    volumes:
      - research_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  research_data:
